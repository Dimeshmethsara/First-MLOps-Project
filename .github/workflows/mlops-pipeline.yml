name: MLOps Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  S3_BUCKET: churn-model-bucket-cicd-dimesh

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate dataset
        run: python generate_data.py

      - name: Train model
        run: python train.py

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Push model to S3
        run: |
          aws s3 cp models/churn_model.pkl s3://${{ env.S3_BUCKET }}/model/model.pkl
          echo "Model pushed to S3 successfully"

      - name: Update inference.yaml with S3 model path
        run: |
          MODEL_URI="s3://${{ env.S3_BUCKET }}/model/model.pkl"
          sed -i "s|s3://.*|$MODEL_URI|g" inference.yaml

      - name: Commit updated inference.yaml
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add k8s/inference.yaml
          git commit -m "Update model S3 path [skip ci]" || echo "No changes"
          git push || echo "No changes to push"
